# Provider configuration for autoessay
# autoessay auto-detects available providers from .env keys

providers:
  deepseek:
    base_url: https://api.deepseek.com/v1
    env_key: DEEPSEEK_API_KEY
    models:
      fast: deepseek-v4-flash
      smart: deepseek-v4-pro

  zai:
    base_url: https://api.z.ai/api/coding/paas/v4
    env_key: ZAI_API_KEY
    models:
      fast: glm-5.2          # reasoning model — heavy on thinking tokens
      smart: glm-5.2         # same model for both tiers (Coding Plan limited)

# openrouter:  # commented out — too unpredictable
#   base_url: https://openrouter.ai/api/v1
#   env_key: OPENROUTER_API_KEY
#   models:
#     fast: deepseek/deepseek-v4-flash
#     smart: deepseek/deepseek-v4-pro

# Role-to-tier mapping
roles:
  research: smart
  outline: smart
  drafting: fast
  evaluation: fast        # MUST differ from drafting provider (anti-self-review)
  reader_panel: smart
  revision: fast
  tightening: fast
  revision_brief: smart
