# Default provider configuration for autoessay
# Model tiers are resolved at runtime based on available API keys
# Set env keys in .env — autoessay auto-detects which providers are available

providers:
  anthropic:
    base_url: https://api.anthropic.com/v1
    env_key: ANTHROPIC_API_KEY
    models:
      fast: claude-sonnet-4-20250514
      smart: claude-opus-4-20250514

  deepseek:
    base_url: https://api.deepseek.com/v1
    env_key: DEEPSEEK_API_KEY
    models:
      fast: deepseek-chat
      smart: deepseek-reasoner

  openrouter:
    base_url: https://openrouter.ai/api/v1
    env_key: OPENROUTER_API_KEY
    models:
      fast: deepseek/deepseek-chat
      smart: anthropic/claude-sonnet-4

  zai:
    base_url: https://api.z.ai/api/v1
    env_key: ZAI_API_KEY
    models:
      fast: glm-4-flash
      smart: glm-4-plus

# Role-to-tier mapping — which pipeline phases use fast vs smart models
roles:
  research: smart      # Deep reasoning for research synthesis
  outline: smart       # Structural reasoning
  drafting: fast       # Volume — many sections
  evaluation: fast     # Different provider from drafting (anti-self-review)
  reader_panel: smart  # Multi-persona reasoning
  revision: fast       # Follows revision brief
  tightening: fast     # Mechanical word reduction
  revision_brief: smart # Synthesize feedback
